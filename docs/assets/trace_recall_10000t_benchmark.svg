<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Trace Recall Engine long conversation benchmark</title>
  <desc id="desc">Infographic summarizing 10,000-turn benchmark results: precision 0.927, average prompt size 429 tokens, average ThreadGroups 1.78, fatigue suppressed 764, unexpected hit 109.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #cbd5e1; }
      .section { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #e2e8f0; letter-spacing: .4px; }
      .label { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #cbd5e1; }
      .small { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #94a3b8; }
      .metric { font: 800 46px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; }
      .box { fill: url(#card); stroke: #334155; stroke-width: 1.5; rx: 24; filter: url(#shadow); }
      .pill { fill: #0f172a; stroke: #334155; stroke-width: 1.2; rx: 18; }
    </style>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>

  <text x="60" y="78" class="title">Trace Recall Engine</text>
  <text x="60" y="112" class="subtitle">Long conversation benchmark · 10,000 turns</text>

  <rect x="60" y="150" width="1080" height="150" class="box"/>
  <text x="92" y="188" class="section">Key result</text>
  <text x="92" y="232" class="metric">Stable recall without prompt explosion</text>
  <text x="94" y="268" class="subtitle">Prompt size stayed compact while recall quality remained high across long conversation history.</text>

  <rect x="60" y="330" width="250" height="170" class="box"/>
  <text x="88" y="370" class="label">Recall precision</text>
  <text x="88" y="430" class="metric">0.927</text>
  <text x="88" y="468" class="small">Precision-like average</text>

  <rect x="335" y="330" width="250" height="170" class="box"/>
  <text x="363" y="370" class="label">Avg prompt size</text>
  <text x="363" y="430" class="metric">429</text>
  <text x="363" y="468" class="small">tokens · max 693</text>

  <rect x="610" y="330" width="250" height="170" class="box"/>
  <text x="638" y="370" class="label">Avg ThreadGroups</text>
  <text x="638" y="430" class="metric">1.78</text>
  <text x="638" y="468" class="small">max 4 per turn</text>

  <rect x="885" y="330" width="255" height="170" class="box"/>
  <text x="913" y="370" class="label">Fatigue suppressed</text>
  <text x="913" y="430" class="metric">764</text>
  <text x="913" y="468" class="small">repetitive traces held back</text>

  <rect x="60" y="535" width="1080" height="90" class="box"/>
  <text x="92" y="570" class="section">Benchmark details</text>

  <rect x="92" y="590" width="170" height="34" class="pill"/>
  <text x="112" y="613" class="small">Ask turns: 1,424</text>

  <rect x="282" y="590" width="190" height="34" class="pill"/>
  <text x="302" y="613" class="small">Expected hits: 1,802</text>

  <rect x="492" y="590" width="190" height="34" class="pill"/>
  <text x="512" y="613" class="small">Unexpected hits: 109</text>

  <rect x="702" y="590" width="210" height="34" class="pill"/>
  <text x="722" y="613" class="small">Noise rate: approx. 6%</text>

  <rect x="932" y="590" width="170" height="34" class="pill"/>
  <text x="952" y="613" class="small">Status: stable</text>

  <circle cx="1045" cy="72" r="42" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
  <text x="1017" y="79" class="section">10k</text>
</svg>
